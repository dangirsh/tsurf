[package]
name = "secret-proxy"
version = "0.1.0"
edition = "2021"

[[bin]]
name = "secret-proxy"
path = "src/main.rs"

[dependencies]
axum = "0.8"
reqwest = { version = "0.12", features = ["stream"] }
tokio = { version = "1", features = ["full"] }
serde = { version = "1", features = ["derive"] }
toml = "0.8"
http = "1"
tower = "0.5"
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
bytes = "1"
futures-util = "0.3"

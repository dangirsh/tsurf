<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Neurosys</title>
    <style>
      :root {
        color-scheme: dark;

        /* Backgrounds */
        --ns-bg:         #1a1a2e;
        --ns-surface:    #232340;
        --ns-surface-2:  #2c2c4d;
        --ns-surface-3:  #0f1226;

        /* Text */
        --ns-text:       #f1f2f8;
        --ns-muted:      #a3a8c0;
        --ns-faint:      #6b7085;

        /* Borders */
        --ns-border:     #3c3f66;
        --ns-border-subtle: rgba(255, 255, 255, 0.06);

        /* Accent */
        --ns-accent:     #8ad8ff;
        --ns-accent-hover: #b0e4ff;

        /* Status */
        --ns-ok:         #33d17a;
        --ns-warn:       #f8e45c;
        --ns-bad:        #ff6b6b;
        --ns-unknown:    #8b8fa8;

        /* Radii */
        --ns-radius-sm:  4px;
        --ns-radius-md:  8px;
        --ns-radius-lg:  12px;

        /* Font stacks */
        --ns-font:       "Iosevka Aile", "JetBrains Mono", ui-monospace, monospace;
        --ns-font-sans:  system-ui, -apple-system, "Segoe UI", sans-serif;
      }

      * { box-sizing: border-box; }

      body {
        margin: 0;
        font-family: var(--ns-font);
        background: var(--ns-bg);
        color: var(--ns-text);
        min-height: 100vh;
      }

      a { color: var(--ns-accent); }
      a:hover { color: var(--ns-accent-hover); }

      body {
        background: radial-gradient(circle at top, #24244a, var(--ns-bg));
      }

      main {
        max-width: 980px;
        margin: 0 auto;
        padding: 2rem 1rem 3rem;
      }

      h1 {
        margin: 0 0 0.5rem;
        font-size: 1.8rem;
      }

      .subtitle {
        color: var(--ns-muted);
        margin-bottom: 1rem;
      }

      .filters {
        display: flex;
        gap: 0.6rem;
        margin-bottom: 1.2rem;
        align-items: center;
      }

      .search-input {
        flex: 1;
        padding: 0.55rem 0.8rem;
        border: 1px solid var(--ns-border);
        border-radius: 8px;
        background: var(--ns-surface);
        color: var(--ns-text);
        font: inherit;
        font-size: 0.95rem;
        outline: none;
      }

      .search-input:focus {
        border-color: var(--ns-accent);
      }

      .search-input::placeholder {
        color: var(--ns-muted);
      }

      .filter-btn {
        padding: 0.55rem 0.9rem;
        border: 1px solid var(--ns-border);
        border-radius: 8px;
        background: var(--ns-surface);
        color: var(--ns-muted);
        font: inherit;
        font-size: 0.9rem;
        cursor: pointer;
        white-space: nowrap;
        transition: all 0.15s ease;
      }

      .filter-btn:hover {
        border-color: var(--ns-bad);
        color: var(--ns-text);
      }

      .filter-btn.active {
        /* Tints correspond to --ns-bad (rgb 255,107,107). */
        background: rgba(255, 107, 107, 0.15);
        border-color: var(--ns-bad);
        color: var(--ns-bad);
      }

      .hidden {
        display: none !important;
      }

      .match-count {
        color: var(--ns-muted);
        font-size: 0.85rem;
        white-space: nowrap;
      }

      .deploy-banner {
        padding: 0.7rem 1rem;
        border-radius: 8px;
        margin-bottom: 1rem;
        border: 1px solid var(--ns-border);
      }

      .status-summary {
        display: flex;
        gap: 1rem;
        align-items: center;
        padding: 0.5rem 0;
        margin-bottom: 0.8rem;
        font-size: 0.88rem;
        color: var(--ns-muted);
      }

      .status-summary .count {
        font-weight: 600;
      }

      .status-summary .count-ok {
        color: var(--ns-ok);
      }

      .status-summary .count-warn {
        color: var(--ns-warn);
      }

      .status-summary .count-bad {
        color: var(--ns-bad);
      }

      .tab-bar {
        display: flex;
        gap: 0;
        margin-bottom: 1.2rem;
        border-bottom: 1px solid var(--ns-border);
      }

      .tab {
        padding: 0.5rem 1.2rem;
        border: none;
        background: none;
        color: var(--ns-muted);
        font: inherit;
        font-size: 0.9rem;
        cursor: pointer;
        border-bottom: 2px solid transparent;
        transition: color 0.15s, border-color 0.15s;
        text-decoration: none;
      }

      .tab:hover {
        color: var(--ns-text);
      }

      .tab.active {
        color: var(--ns-text);
        border-bottom-color: var(--ns-accent);
        font-weight: 600;
      }

      .tab-external::after {
        content: " \2197";
        font-size: 0.75rem;
      }

      .tab-panel {
        display: none;
      }

      .tab-panel.active {
        display: block;
      }

      .cost-panel table {
        width: 100%;
        border-collapse: collapse;
        font-size: 0.95rem;
      }

      .cost-panel th,
      .cost-panel td {
        text-align: left;
        padding: 0.55rem 0.5rem;
        border-bottom: 1px solid var(--ns-border);
      }

      .cost-panel th {
        color: var(--ns-muted);
        font-size: 0.78rem;
        text-transform: uppercase;
        letter-spacing: 0.06em;
      }

      .cost-panel .r {
        text-align: right;
      }

      .cost-panel .total td {
        font-weight: 700;
        border-top: 2px solid var(--ns-border);
        border-bottom: none;
      }

      .cost-panel .cost-warn {
        color: var(--ns-warn);
      }

      .cost-panel .cost-bad {
        color: var(--ns-bad);
      }

      .cost-sub {
        color: var(--ns-muted);
        margin-bottom: 1rem;
        font-size: 0.88rem;
      }

      .cost-err {
        color: var(--ns-bad);
        margin-bottom: 1rem;
      }

      /* Status tints correspond to --ns-ok/--ns-bad/--ns-warn tokens. */
      .deploy-success {
        background: rgba(51, 209, 122, 0.08);
        border-color: rgba(51, 209, 122, 0.3);
      }

      .deploy-failed {
        background: rgba(255, 107, 107, 0.08);
        border-color: rgba(255, 107, 107, 0.3);
      }

      .deploy-rolled-back {
        background: rgba(248, 228, 92, 0.08);
        border-color: rgba(248, 228, 92, 0.3);
      }

      .deploy-status-line {
        display: flex;
        align-items: center;
        gap: 0.5rem;
        font-weight: 600;
        font-size: 0.95rem;
      }

      .deploy-summary {
        margin-top: 0.35rem;
        color: var(--ns-muted);
        font-size: 0.88rem;
        white-space: pre-line;
        line-height: 1.5;
      }

      .host-badge {
        font-size: 0.7rem;
        padding: 0.05rem 0.35rem;
        border-radius: 8px;
        margin-left: 0;
        font-weight: 400;
        vertical-align: middle;
      }

      /* Accent tint corresponds to --ns-accent (rgb 138,216,255). */
      .host-local {
        background: rgba(138, 216, 255, 0.12);
        color: var(--ns-accent);
      }

      .host-remote {
        background: rgba(163, 168, 192, 0.12);
        color: var(--ns-muted);
      }

      .module-group {
        border: 1px solid var(--ns-border);
        border-radius: 8px;
        background: rgba(35, 35, 64, 0.85);
        margin-bottom: 0.6rem;
        overflow: hidden;
      }

      .module-group > summary {
        cursor: pointer;
        padding: 0.85rem 1rem;
        list-style: none;
        font-weight: 700;
        background: rgba(44, 44, 77, 0.95);
      }

      .module-group > summary::-webkit-details-marker {
        display: none;
      }

      .module-summary {
        display: flex;
        align-items: center;
        justify-content: space-between;
        width: 100%;
      }

      .module-label {
        flex: 1;
      }

      .module-dots {
        display: flex;
        gap: 4px;
        align-items: center;
      }

      .module-dots .mini-dot {
        width: 6px;
        height: 6px;
        border-radius: 50%;
        background: var(--ns-unknown);
      }

      .module-chevron {
        color: var(--ns-muted);
        margin-left: 0.5rem;
        transition: transform 0.2s ease;
        font-size: 0.8rem;
      }

      .module-group[open] .module-chevron {
        transform: rotate(90deg);
      }

      .entries {
        padding: 0.4rem 0.75rem 0.75rem;
      }

      .entry {
        border: 1px solid var(--ns-border);
        border-radius: 8px;
        background: var(--ns-surface);
        margin-top: 0.5rem;
        overflow: hidden;
      }

      .entry-btn {
        width: 100%;
        border: 0;
        background: transparent;
        color: inherit;
        cursor: pointer;
        text-align: left;
        padding: 0.45rem 0.8rem;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 0.7rem;
        font: inherit;
      }

      .entry-btn:hover {
        background: rgba(255, 255, 255, 0.03);
      }

      .entry-title {
        display: flex;
        align-items: center;
        gap: 0.55rem;
        min-width: 0;
      }

      .entry-name {
        font-weight: 600;
      }

      .entry-icon {
        width: 1rem;
        height: 1rem;
        flex: 0 0 auto;
        color: var(--ns-muted);
        opacity: 0.7;
      }

      .entry-meta {
        display: flex;
        align-items: center;
        gap: 0.45rem;
        margin-left: auto;
      }

      .entry-arrow {
        color: var(--ns-muted);
        transition: transform 0.15s ease;
      }

      .entry.open .entry-arrow {
        transform: rotate(90deg);
      }

      .status-dot {
        width: 0.68rem;
        height: 0.68rem;
        border-radius: 50%;
        flex: 0 0 auto;
        background: var(--ns-unknown);
        box-shadow: 0 0 0 2px rgba(0, 0, 0, 0.2);
      }

      .status-ok {
        background: var(--ns-ok);
      }

      .status-warn {
        background: var(--ns-warn);
        animation: pulse-warn 2s ease-in-out infinite;
      }

      .status-bad {
        background: var(--ns-bad);
        animation: pulse-bad 2s ease-in-out infinite;
      }

      .status-unknown {
        background: var(--ns-unknown);
      }

      .details {
        max-height: 0;
        overflow: hidden;
        transition: max-height 0.2s ease, padding 0.2s ease;
        padding: 0 0.8rem 0 2rem;
        font-size: 0.93rem;
        color: var(--ns-muted);
      }

      .entry.open .details {
        max-height: 200px;
        padding: 0 0.8rem 0.8rem 2rem;
      }

      .details dl {
        display: grid;
        grid-template-columns: 6rem 1fr;
        gap: 0.35rem 0.8rem;
        margin: 0;
      }

      .details dt {
        color: var(--ns-text);
        font-weight: 600;
      }

      .details dd {
        margin: 0;
        word-break: break-word;
      }

      .port-badge {
        font-size: 0.75rem;
        color: var(--ns-muted);
        opacity: 0.7;
        padding-right: 0;
      }

      @keyframes pulse-warn {
        0%, 100% {
          box-shadow: 0 0 0 2px rgba(0, 0, 0, 0.2);
        }
        50% {
          /* Pulse tint corresponds to --ns-warn (rgb 248,228,92). */
          box-shadow: 0 0 0 4px rgba(248, 228, 92, 0.25);
        }
      }

      @keyframes pulse-bad {
        0%, 100% {
          box-shadow: 0 0 0 2px rgba(0, 0, 0, 0.2);
        }
        50% {
          /* Pulse tint corresponds to --ns-bad (rgb 255,107,107). */
          box-shadow: 0 0 0 4px rgba(255, 107, 107, 0.3);
        }
      }

      a {
        color: var(--ns-accent);
      }

      .footer {
        margin-top: 1.5rem;
        color: var(--ns-muted);
        font-size: 0.85rem;
      }
    </style>
  </head>
  <body>

    <main>
      <h1>Neurosys</h1>
      <div id="subtitle" class="subtitle">Loading manifest...</div>
      <div id="deploy-banner" class="deploy-banner hidden"></div>
      <div id="status-summary" class="status-summary"></div>
      <div class="tab-bar">
        <button class="tab active" data-tab="services">Services</button>
        <button class="tab" data-tab="cost">Cost</button>
      </div>
      <div id="panel-services" class="tab-panel active">
        <div class="filters">
          <input type="text" id="search" class="search-input"
            placeholder="Filter services..." autocomplete="off">
          <button type="button" id="failingBtn" class="filter-btn"
            >Failing</button>
          <span id="matchCount" class="match-count"></span>
        </div>
        <div id="tree"></div>
      </div>
      <div id="panel-cost" class="tab-panel cost-panel">
        <div id="cost-sub" class="cost-sub">Loading...</div>
        <div id="cost-err" class="cost-err"></div>
        <table id="cost-tbl" style="display:none">
          <thead><tr>
            <th>Provider</th><th class="r">24h</th>
            <th class="r">7d</th><th class="r">30d</th>
            <th class="r">1y</th><th class="r">All</th>
          </tr></thead>
          <tbody id="cost-rows"></tbody>
          <tfoot><tr class="total">
            <td>Total</td>
            <td class="r" id="cost-f24h">&mdash;</td>
            <td class="r" id="cost-f7d">&mdash;</td>
            <td class="r" id="cost-f30d">&mdash;</td>
            <td class="r" id="cost-f1y">&mdash;</td>
            <td class="r" id="cost-fall">&mdash;</td>
          </tr></tfoot>
        </table>
      </div>
      <div class="footer">Auto-refresh: status 10s, cost 5m</div>
    </main>
    <script>
      let currentManifest = null;
      const statusByUnit = {};

      function statusClass(active, sub, external, local) {
        if (external || local === false) {
          return "status-unknown";
        }

        if (!active) {
          return "status-unknown";
        }

        if (active === "active" &&
            (sub === "running" || sub === "waiting" || sub === "exited")) {
          return "status-ok";
        }

        if (
          active === "activating" ||
          active === "reloading" ||
          sub === "activating" ||
          sub === "reloading"
        ) {
          return "status-warn";
        }

        if (
          active === "failed" ||
          active === "inactive" ||
          active === "deactivating"
        ) {
          return "status-bad";
        }

        return "status-unknown";
      }

      function statusText(entry, state) {
        if (entry.external) {
          return "external service";
        }

        if (!entry.isLocal) {
          return "remote";
        }

        if (!entry.systemdUnit) {
          return "no systemd unit";
        }

        if (!state) {
          return "unknown";
        }

        return state.active + "/" + state.sub;
      }

      function makeDetailRow(dl, label, value, cls) {
        if (!value && value !== 0) {
          return;
        }
        var dt = document.createElement("dt");
        dt.textContent = label;
        dl.appendChild(dt);
        var dd = document.createElement("dd");
        if (cls) dd.className = cls;
        dd.textContent = value;
        dl.appendChild(dd);
      }

      function makeIcon(iconId) {
        var knownIcons = {
          "tailscale": true,
          "ssh": true,
          "docker": true,
          "backblaze-b2": true,
          "syncthing": true,
          "terminal": true,
          "dashboard": true,
          "chart": true,
          "shield": true,
          "server": true,
          "default": true,
        };
        if (!iconId || !knownIcons[iconId]) {
          iconId = "default";
        }
        var svg = document.createElementNS("http://www.w3.org/2000/svg", "svg");
        svg.setAttribute("class", "entry-icon");
        svg.setAttribute("viewBox", "0 0 16 16");
        var use = document.createElementNS("http://www.w3.org/2000/svg", "use");
        use.setAttribute("href", "#icon-" + iconId);
        svg.appendChild(use);
        return svg;
      }

      function moduleLabel(moduleName) {
        if (currentManifest && currentManifest.moduleLabels &&
            currentManifest.moduleLabels[moduleName]) {
          return currentManifest.moduleLabels[moduleName];
        }
        return moduleName.replace(/\.nix$/, "");
      }

      function updateSummaryBar() {
        var bar = document.getElementById("status-summary");
        if (!bar) return;
        var dots = document.querySelectorAll(".entry .status-dot");
        var ok = 0;
        var warn = 0;
        var bad = 0;
        var unknown = 0;
        dots.forEach(function(d) {
          if (d.className.indexOf("status-ok") !== -1) ok++;
          else if (d.className.indexOf("status-warn") !== -1) warn++;
          else if (d.className.indexOf("status-bad") !== -1) bad++;
          else unknown++;
        });
        var total = ok + warn + bad + unknown;
        bar.textContent = "";
        function addCount(text, cls) {
          var s = document.createElement("span");
          s.className = "count" + (cls ? " " + cls : "");
          s.textContent = text;
          bar.appendChild(s);
        }
        addCount(total + " services");
        if (ok) addCount(ok + " ok", "count-ok");
        if (warn) addCount(warn + " warn", "count-warn");
        if (bad) addCount(bad + " failed", "count-bad");
        if (unknown) addCount(unknown + " unknown");
      }

      function renderTree() {
        if (!currentManifest) {
          return;
        }

        const tree = document.getElementById("tree");
        tree.textContent = "";

        const primary = currentManifest.primary || "";
        const hosts = currentManifest.hosts || {};
        const hostNames = Object.keys(hosts);
        const multiHost = hostNames.length > 1;

        const byModule = {};
        hostNames.forEach((hostName) => {
          const modules = hosts[hostName].modules || {};
          Object.keys(modules).forEach((modName) => {
            if (!byModule[modName]) byModule[modName] = [];
            modules[modName].forEach((entry) => {
              byModule[modName].push(
                Object.assign({}, entry, {
                  host: hostName,
                  isLocal: hostName === primary,
                })
              );
            });
          });
        });

        const names = Object.keys(byModule).sort();

        names.forEach((moduleName) => {
          const moduleWrap = document.createElement("details");
          moduleWrap.className = "module-group";
          moduleWrap.open = false;

          const summary = document.createElement("summary");
          var summaryInner = document.createElement("div");
          summaryInner.className = "module-summary";
          var label = document.createElement("span");
          label.className = "module-label";
          label.textContent = moduleLabel(moduleName);
          summaryInner.appendChild(label);
          var dots = document.createElement("span");
          dots.className = "module-dots";
          dots.dataset.module = moduleName;
          byModule[moduleName].forEach(function() {
            var d = document.createElement("span");
            d.className = "mini-dot";
            dots.appendChild(d);
          });
          summaryInner.appendChild(dots);
          var chevron = document.createElement("span");
          chevron.className = "module-chevron";
          chevron.textContent = ">";
          summaryInner.appendChild(chevron);
          summary.appendChild(summaryInner);
          moduleWrap.appendChild(summary);

          const entriesWrap = document.createElement("div");
          entriesWrap.className = "entries";

          byModule[moduleName].forEach((entry) => {
            const row = document.createElement("div");
            row.className = "entry";
            row.dataset.entryId = entry.id;
            row.dataset.host = entry.host;
            if (entry.description) {
              row.dataset.description = entry.description;
            }

            const button = document.createElement("button");
            button.className = "entry-btn";
            button.type = "button";

            const title = document.createElement("div");
            title.className = "entry-title";

            const dot = document.createElement("span");
            dot.className = "status-dot status-unknown";
            dot.dataset.unit = entry.systemdUnit || "";
            dot.dataset.external = entry.external ? "1" : "0";
            dot.dataset.local = entry.isLocal ? "1" : "0";

            const icon = makeIcon(entry.icon);

            const name = document.createElement("span");
            name.className = "entry-name";
            name.textContent = entry.name;

            title.appendChild(icon);
            title.appendChild(dot);
            title.appendChild(name);

            const arrow = document.createElement("span");
            arrow.className = "entry-arrow";
            arrow.textContent = ">";

            const meta = document.createElement("div");
            meta.className = "entry-meta";

            button.appendChild(title);
            if (entry.port) {
              var portBadge = document.createElement("span");
              portBadge.className = "port-badge";
              portBadge.textContent = ":" + entry.port;
              meta.appendChild(portBadge);
            }
            if (multiHost) {
              const badge = document.createElement("span");
              badge.className = "host-badge " +
                (entry.isLocal ? "host-local" : "host-remote");
              badge.textContent = entry.host;
              meta.appendChild(badge);
            }
            meta.appendChild(arrow);
            button.appendChild(meta);
            row.appendChild(button);

            const details = document.createElement("div");
            details.className = "details";
            details.dataset.status =
              entry.systemdUnit || entry.id;

            var dl = document.createElement("dl");
            makeDetailRow(dl, "Desc", entry.description);
            makeDetailRow(dl, "Host", entry.host);
            makeDetailRow(dl, "Port", entry.port);
            makeDetailRow(dl, "Unit", entry.systemdUnit);
            makeDetailRow(dl, "Status", "loading...", "status-val");
            if (entry.url) {
              var dt = document.createElement("dt");
              dt.textContent = "URL";
              dl.appendChild(dt);
              var dd = document.createElement("dd");
              var a = document.createElement("a");
              try {
                var parsed = new URL(entry.url, window.location.origin);
                if (parsed.protocol === "http:" || parsed.protocol === "https:") {
                  a.href = parsed.toString();
                }
              } catch (e) {
                // invalid URL — render as text only
              }
              a.target = "_blank";
              a.rel = "noopener noreferrer";
              a.textContent = "open";
              dd.appendChild(a);
              dl.appendChild(dd);
            }
            details.appendChild(dl);

            row.appendChild(details);

            button.addEventListener("click", () => {
              row.classList.toggle("open");
            });

            entriesWrap.appendChild(row);
          });

          moduleWrap.appendChild(entriesWrap);
          tree.appendChild(moduleWrap);
        });

        updateStatusUi();
      }

      function updateStatusUi() {
        if (!currentManifest) {
          return;
        }

        const dots = document.querySelectorAll(".status-dot");
        dots.forEach((dot) => {
          const unit = dot.dataset.unit;
          const external = dot.dataset.external === "1";
          const local = dot.dataset.local === "1";
          const state = unit ? statusByUnit[unit] : null;
          const active = state ? state.active : null;
          const sub = state ? state.sub : null;
          dot.className = "status-dot " +
            statusClass(active, sub, external, local);
        });

        const statusCells = document.querySelectorAll(".details");
        statusCells.forEach((details) => {
          const parent = details.closest(".entry");
          if (!parent) {
            return;
          }
          const dot = parent.querySelector(".status-dot");
          const unit = dot ? dot.dataset.unit : "";
          const external = dot
            ? dot.dataset.external === "1" : false;
          const local = dot
            ? dot.dataset.local === "1" : true;
          const text = statusText(
            {
              external: external,
              systemdUnit: unit,
              isLocal: local,
            },
            unit ? statusByUnit[unit] : null
          );
          const cell = details.querySelector("dd.status-val");
          if (cell) {
            cell.textContent = text;
          }
        });

        updateSummaryBar();

        document.querySelectorAll(".module-dots").forEach(function(container) {
          var group = container.closest(".module-group");
          if (!group) return;
          var entryDots = group.querySelectorAll(".entry .status-dot");
          var miniDots = container.querySelectorAll(".mini-dot");
          entryDots.forEach(function(ed, i) {
            if (miniDots[i]) {
              miniDots[i].className = "mini-dot";
              if (ed.className.indexOf("status-ok") !== -1) {
                miniDots[i].style.background = "var(--ns-ok)";
              } else if (ed.className.indexOf("status-warn") !== -1) {
                miniDots[i].style.background = "var(--ns-warn)";
              } else if (ed.className.indexOf("status-bad") !== -1) {
                miniDots[i].style.background = "var(--ns-bad)";
              } else {
                miniDots[i].style.background = "var(--ns-unknown)";
              }
            }
          });
        });
      }

      async function fetchManifest() {
        const response = await fetch("/manifest.json");
        if (!response.ok) {
          throw new Error("manifest fetch failed");
        }
        currentManifest = await response.json();
        const hosts = Object.keys(
          currentManifest.hosts || {}
        );
        document.getElementById("subtitle").textContent =
          hosts.join(" + ");
        renderTree();
      }

      async function fetchStatus() {
        const response = await fetch("/api/status");
        if (!response.ok) {
          return;
        }
        const data = await response.json();
        const units = data.units || {};
        Object.keys(units).forEach((name) => {
          statusByUnit[name] = units[name];
        });
        updateStatusUi();
      }

      function escapeHtml(s) {
        return s.replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;");
      }

      function timeAgo(ts) {
        var now = Date.now();
        var then = new Date(ts).getTime();
        var diff = Math.floor((now - then) / 1000);
        if (diff < 60) return "just now";
        if (diff < 3600) {
          return Math.floor(diff / 60) + "m ago";
        }
        if (diff < 86400) {
          return Math.floor(diff / 3600) + "h ago";
        }
        return Math.floor(diff / 86400) + "d ago";
      }

      async function fetchDeployStatus() {
        try {
          var r = await fetch("/api/deploy-status");
          if (!r.ok) return;
          var d = await r.json();
          if (!d.status || d.status === "unknown") return;

          var banner = document.getElementById("deploy-banner");
          var isOk = d.status === "success";
          var isRolled = d.status === "rolled-back";
          var cls = isOk ? "deploy-success"
            : isRolled ? "deploy-rolled-back"
            : "deploy-failed";
          banner.className = "deploy-banner " + cls;

          var color = isOk ? "var(--ns-ok)"
            : isRolled ? "var(--ns-warn)" : "var(--ns-bad)";
          var label = d.status.toUpperCase()
            .replace("-", " ");
          var ago = timeAgo(d.timestamp);

          banner.textContent = "";
          var statusLine = document.createElement("div");
          statusLine.className = "deploy-status-line";
          var dot = document.createElement("span");
          dot.style.color = color;
          dot.textContent = "\u25cf ";
          statusLine.appendChild(dot);
          statusLine.appendChild(
            document.createTextNode("Deploy " + label + " \u2014 " + ago)
          );
          if (d.sha) {
            var shaSpan = document.createElement("span");
            shaSpan.style.cssText = "color:var(--ns-muted);font-weight:400";
            shaSpan.textContent = " (" + d.sha + ")";
            statusLine.appendChild(shaSpan);
          }
          banner.appendChild(statusLine);

          if (d.summary) {
            var summaryDiv = document.createElement("div");
            summaryDiv.className = "deploy-summary";
            summaryDiv.textContent = d.summary;
            banner.appendChild(summaryDiv);
          }
          banner.classList.remove("hidden");
        } catch (e) {
          // deploy status unavailable -- banner stays hidden
        }
      }

      async function run() {
        try {
          await fetchManifest();
          await fetchStatus();
          await fetchDeployStatus();
          setInterval(fetchStatus, 10000);
          setInterval(fetchDeployStatus, 60000);
        } catch (error) {
          document.getElementById("subtitle").textContent =
            "Failed to load dashboard data";
        }
      }

      run();

      var costLoaded = false;

      function fmtCost(n) {
        return "$" + n.toFixed(2);
      }

      function costCls(v) {
        return v >= 50 ? "cost-bad" : v >= 20 ? "cost-warn" : "";
      }

      function loadCost() {
        var periods = ["cost_24h","cost_7d","cost_30d","cost_365d","cost_730d"];
        var footIds = ["cost-f24h","cost-f7d","cost-f30d","cost-f1y","cost-fall"];
        fetch("/api/cost-data").then(function(r) {
          if (!r.ok) throw new Error("HTTP " + r.status);
          return r.json();
        }).then(function(d) {
          var rows = document.getElementById("cost-rows");
          rows.textContent = "";
          var tots = [0,0,0,0,0];
          (d.instances || []).forEach(function(inst) {
            var u = inst.usage || {};
            var tr = document.createElement("tr");
            var userTd = document.createElement("td");
            userTd.textContent = inst.user;
            tr.appendChild(userTd);
            for (var i = 0; i < periods.length; i++) {
              var v = u[periods[i]] || 0;
              tots[i] += v;
              var cl = costCls(v);
              var td = document.createElement("td");
              td.className = "r" + (cl ? " " + cl : "");
              td.textContent = fmtCost(v);
              tr.appendChild(td);
            }
            rows.appendChild(tr);
          });
          for (var i = 0; i < footIds.length; i++) {
            var el = document.getElementById(footIds[i]);
            var cl = costCls(tots[i]);
            el.textContent = fmtCost(tots[i]);
            el.className = "r" + (cl ? " " + cl : "");
          }
          document.getElementById("cost-tbl").style.display = "";
          var asOf = (d.as_of || "")
            .replace("T", " ")
            .slice(0, 19) + " UTC";
          document.getElementById("cost-sub").textContent =
            "updated " + asOf;
          document.getElementById("cost-err").textContent = "";
          costLoaded = true;
        }).catch(function(e) {
          document.getElementById("cost-err").textContent =
            "Error: " + e.message;
        });
      }

      // Tab navigation
      document.querySelectorAll(".tab[data-tab]").forEach(function(tab) {
        tab.addEventListener("click", function() {
          var target = tab.dataset.tab;
          document.querySelectorAll(".tab[data-tab]").forEach(function(t) {
            t.classList.toggle("active", t.dataset.tab === target);
          });
          document.querySelectorAll(".tab-panel").forEach(function(p) {
            p.classList.toggle("active", p.id === "panel-" + target);
          });
          if (target === "cost" && !costLoaded) {
            loadCost();
          }
        });
      });

      // Check URL for tab parameter
      var urlTab = new URLSearchParams(window.location.search).get("tab");
      if (urlTab) {
        var tabBtn = document.querySelector(
          '.tab[data-tab="' + urlTab + '"]'
        );
        if (tabBtn) tabBtn.click();
      }

      // Auto-refresh cost data every 5 minutes if tab is active
      setInterval(function() {
        var activeCost = document.querySelector('.tab[data-tab="cost"]');
        if (activeCost && activeCost.classList.contains("active")) {
          loadCost();
        }
      }, 300000);

      let failingOnly = false;
      const searchEl = document.getElementById("search");
      const failBtn = document.getElementById("failingBtn");
      const countEl = document.getElementById("matchCount");

      function applyFilters() {
        const query = searchEl.value.toLowerCase().trim();
        const entries = document.querySelectorAll(".entry");
        let visible = 0;
        let total = entries.length;

        entries.forEach((entry) => {
          const btn = entry.querySelector(".entry-btn");
          const name = btn ? btn.textContent.toLowerCase() : "";
          const desc = (entry.dataset.description || "").toLowerCase();
          const matchesText = !query || name.indexOf(query) !== -1
            || desc.indexOf(query) !== -1;

          let matchesFailing = true;
          if (failingOnly) {
            const dot = entry.querySelector(".status-dot");
            if (dot) {
              const cls = dot.className;
              matchesFailing = cls.indexOf("status-bad") !== -1
                || cls.indexOf("status-warn") !== -1;
            } else {
              matchesFailing = false;
            }
          }

          const show = matchesText && matchesFailing;
          entry.classList.toggle("hidden", !show);
          if (show) visible++;
        });

        document.querySelectorAll(".module-group").forEach((group) => {
          const visEntries = group.querySelectorAll(
            ".entry:not(.hidden)"
          );
          group.classList.toggle("hidden", visEntries.length === 0);
        });

        if (query || failingOnly) {
          countEl.textContent = visible + "/" + total;
        } else {
          countEl.textContent = "";
        }
      }

      searchEl.addEventListener("input", applyFilters);
      failBtn.addEventListener("click", () => {
        failingOnly = !failingOnly;
        failBtn.classList.toggle("active", failingOnly);
        applyFilters();
      });

      const origUpdate = updateStatusUi;
      updateStatusUi = function() {
        origUpdate();
        applyFilters();
      };
    </script>
  </body>
</html>

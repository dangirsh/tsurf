name: NixOS Config Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  eval-checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Nix
        uses: DeterminateSystems/determinate-nix-action@v3
        with:
          extra-conf: |
            experimental-features = nix-command flakes
            accept-flake-config = true

      - name: Run flake check (eval + deploy-rs checks)
        run: nix flake check --print-build-logs

      - name: Build test-live package (verify it builds)
        run: nix build .#test-live --no-link --print-build-logs

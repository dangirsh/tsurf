name: NixOS Config Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  eval-checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install Nix
        uses: DeterminateSystems/determinate-nix-action@629b284231c2a82554b724e357e47fc6020833c8 # v3
        with:
          extra-conf: |
            experimental-features = nix-command flakes

      - name: Run flake check (eval + deploy-rs checks)
        run: nix flake check --print-build-logs

      - name: Build test-live package (verify it builds)
        run: nix build .#test-live --no-link --print-build-logs

      - name: Enable KVM group perms
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Build credential proxy VM proof
        run: nix build .#vm-test-credential-proxy --no-link --print-build-logs
